# Tram Monitoring System - Server Configuration
#
# Configure your Docker containers here.
# The first server in the list will be used for auto-connection on startup.

servers:
  # Agent connection (monitoring_agent node inside Docker)
  # No docker exec — communicates via WebSocket directly with ROS2 node.
  - id: local-agent
    name: "Local Agent"
    type: agent
    agent_url: "ws://localhost:9090"
    
  - id: local
    name: "Local Docker"
    type: local
    container: tram_autoware
    ros_workspace: "$HOME/tram.autoware"

  - id: server_30639
    name: "Tram_30639"
    type: ssh
    host: 192.168.242.7
    port: 22
    user: tram
    container: tram_autoware
    password: "1qaz@WSX"
    ros_workspace: "$HOME/tram.autoware"



