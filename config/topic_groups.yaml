# Topic Group Configuration for Tram Monitoring System
#
# Define groups of related topics for monitoring Hz and Echo.
# Groups are displayed in the Topics tab of the UI.
# To add a new group, copy the template below:
#
#   - id: unique_id
#     name: "Human-readable name"
#     topics:
#       - /topic/path/one
#       - /topic/path/two

topic_groups:
  - id: lidar_raw
    name: "Лидарные пакеты (rslidar_packets)"
    topics:
      - /sensing/lidar/front/rslidar_packets
      - /sensing/lidar/front_left/rslidar_packets
      - /sensing/lidar/front_right/rslidar_packets
      - /sensing/lidar/top/rslidar_packets

  - id: lidar_pointclouds
    name: "Лидарные облака от драйвера rslidar"
    topics:
      - /sensing/lidar/front/pointcloud_raw_ex
      - /sensing/lidar/front_left/pointcloud_raw_ex
      - /sensing/lidar/front_right/pointcloud_raw_ex
      - /sensing/lidar/top/pointcloud_raw_ex

  - id: lidar_pipeline
    name: "Лидарный пайплайн"
    topics:
      - /sensing/lidar/front/rslidar_packets
      - /sensing/lidar/front/pointcloud_raw_ex
      - /sensing/lidar/front/mr_filtered/pointcloud_ex
      - /sensing/lidar/front/ego_cropped/pointcloud_ex
      - /sensing/lidar/front/rectified/pointcloud_ex
      - /sensing/lidar/front/converted/pointcloud_ex
      - /sensing/lidar/front/outlier_filtered/pointcloud
      - /sensing/lidar/concatenated/pointcloud

  - id: odometry
    name: "Одометрия"
    topics:
      - /vehicle/front_bogie_velocity
      - /vehicle/rear_bogie_velocity

  - id: gnss
    name: "GNSS"
    topics:
      - /sensing/gnss/master/tram_fix
      - /sensing/gnss/rover/tram_fix
